<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Snack Buddy | 앱 정보</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260507" />
    <style>
      body {
        background:
          radial-gradient(circle at 14% 12%, color-mix(in srgb, var(--primary) 22%, transparent 78%), transparent 42%),
          radial-gradient(circle at 88% 82%, color-mix(in srgb, #ffcc93 30%, transparent 70%), transparent 40%),
          var(--bg);
      }

      .about-view {
        display: block;
      }

      .about-header {
        margin-bottom: 14px;
      }

      .about-title {
        margin: 0;
        font-family: "Baloo 2", "Noto Sans KR", sans-serif;
        font-size: clamp(1.9rem, 5.3vw, 2.4rem);
        font-weight: 800;
        line-height: 1.04;
        letter-spacing: 0.01em;
        background: linear-gradient(135deg, #f9a54f 0%, #f08738 46%, #d96a3f 100%);
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        text-shadow: 0 8px 18px rgba(242, 149, 74, 0.2);
      }

      .about-card {
        margin-top: 8px;
      }

      .about-row + .about-row {
        margin-top: 14px;
      }

      .about-label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.93rem;
        font-weight: 800;
      }

      .about-value {
        margin: 0;
        font-size: 1.03rem;
        font-weight: 500;
        line-height: 1.62;
      }

      .about-notice {
        margin: 16px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 600;
        line-height: 1.58;
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="about-view" aria-label="앱 정보 화면">
        <header class="history-header about-header">
          <button class="ghost" type="button" onclick="window.location.href='./index.html?skipSplash=1'">← 뒤로가기</button>
          <h2 class="about-title">앱 정보</h2>
        </header>

        <section class="counter-card about-card" aria-label="Snack Buddy 정보">
          <article class="about-row">
            <p class="about-label">서비스명</p>
            <p class="about-value">Snack Buddy</p>
          </article>
          <article class="about-row">
            <p class="about-label">만든이</p>
            <p class="about-value">
              디자인: 김지영, 윤혜준<br />
              개발: 김지영<br />
              기획: 윤혜준, 김지영
            </p>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
